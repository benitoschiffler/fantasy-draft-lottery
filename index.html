<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏈 Fantasy Draft Lottery 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --gold:   #FFD700;
      --gold2:  #FFA500;
      --dark:   #0a0a12;
      --card:   #13131f;
      --border: #2a2a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: linear-gradient(180deg, #1a0a2e 0%, transparent 100%);
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--gold), var(--gold2), #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #aaa;
      font-size: 1rem;
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 300px;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      align-items: start;
    }
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px)  { .main-grid { grid-template-columns: 1fr; } }

    /* ── PANEL ── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 18px;
    }

    /* ── ODDS ── */
    .odds-list { display: flex; flex-direction: column; gap: 8px; }
    .odds-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      transition: all .3s;
      position: relative;
      overflow: hidden;
    }
    .odds-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      border-radius: 10px 0 0 10px;
      width: 4px;
    }
    .odds-row.rank-1::before  { background: #FFD700; }
    .odds-row.rank-2::before  { background: #FFA500; }
    .odds-row.rank-3::before  { background: #FF8C00; }
    .odds-row.rank-4::before  { background: #FF6B00; }
    .odds-row.rank-5::before  { background: #FF4500; }
    .odds-row.rank-6::before  { background: #e53935; }
    .odds-row.rank-7::before  { background: #9c27b0; }
    .odds-row.rank-8::before  { background: #3f51b5; }
    .odds-row.rank-9::before  { background: #0288d1; }
    .odds-row.rank-10::before { background: #00897b; }

    .odds-row.eliminated { opacity: 0.3; filter: grayscale(1); }
    .odds-row.winner-flash { animation: winFlash .6s ease; }
    @keyframes winFlash {
      0%,100% { background: #1a1a2a; }
      50%      { background: #2a2a00; border-color: var(--gold); }
    }
    .team-rank  { font-size: .75rem; color: #666; width: 28px; text-align: center; font-weight: 700; }
    .team-name  { flex: 1; font-weight: 700; font-size: .95rem; }
    .odds-bar-wrap { width: 80px; height: 6px; background: #2a2a3a; border-radius: 3px; overflow: hidden; }
    .odds-bar   { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); }
    .odds-pct   { font-size: .8rem; font-weight: 700; color: var(--gold); width: 40px; text-align: right; }

    /* ── TRACK INDICATOR ── */
    #trackLabel {
      text-align: center;
      font-size: .7rem;
      letter-spacing: 2px;
      color: #444;
      margin-top: 6px;
      min-height: 16px;
      text-transform: uppercase;
    }

    /* ── BUTTONS ── */
    .btn-wrap { text-align: center; margin: 20px 0 8px; }
    #startBtn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      padding: 16px 60px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255,215,0,.4);
      transition: all .2s;
    }
    #startBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,215,0,.7); }
    #startBtn:disabled { opacity: .4; cursor: not-allowed; }
    #resetBtn {
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      padding: 10px 28px;
      border: 1px solid #3a3a5a;
      border-radius: 50px;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all .2s;
      display: none;
    }
    #resetBtn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 0 0 14px;
    }
    .mode-btn {
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #3a3a5a;
      background: transparent;
      color: #666;
      cursor: pointer;
      letter-spacing: .5px;
      transition: all .2s;
    }
    .mode-btn.active {
      background: #1a1a2a;
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 12px rgba(255,215,0,.2);
    }
    .mode-btn:hover:not(.active) { border-color: #666; color: #aaa; }

    /* ── MACHINE ── */
    .machine {
      position: relative;
      height: 160px;
      margin: 8px 0 16px;
      border-radius: 12px;
      background: #0e0e1a;
      border: 1px solid #2a2a3a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .machine-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #444;
      z-index: 1;
      pointer-events: none;
    }
    #ballContainer { position: absolute; width: 100%; height: 100%; }
    .ball {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .55rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
      pointer-events: none;
      box-shadow: inset -3px -3px 6px rgba(0,0,0,.4), inset 2px 2px 4px rgba(255,255,255,.2);
      transition: opacity .3s;
    }

    /* ── RESULTS ── */
    #resultsBoard { display: flex; flex-direction: column; gap: 8px; }
    .pick-slot {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #0e0e1a;
      border: 1px solid #1e1e2e;
      min-height: 58px;
      transition: all .4s;
      overflow: hidden;
    }
    .pick-slot.revealed    { border-color: #3a3a5a; background: #141426; }
    .pick-slot.pick-1      { border-color: var(--gold) !important; background: linear-gradient(135deg, #1a1400, #0e0e1a) !important; box-shadow: 0 0 20px rgba(255,215,0,.25); }
    .pick-slot.revealing   { animation: revealPop .5s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes revealPop {
      0%   { transform: scale(.95); opacity: .4; }
      60%  { transform: scale(1.03); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .pick-number     { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #333; width: 36px; text-align: center; flex-shrink: 0; transition: color .4s; }
    .pick-slot.revealed .pick-number { color: #666; }
    .pick-slot.pick-1 .pick-number   { color: var(--gold); }
    .pick-divider    { width: 1px; height: 30px; background: #2a2a3a; flex-shrink: 0; }
    .pick-team       { flex: 1; font-size: .95rem; font-weight: 700; color: #555; transition: all .4s; }
    .pick-slot.revealed .pick-team { color: #eee; }
    .pick-slot.pick-1 .pick-team   { color: var(--gold); font-size: 1.1rem; }
    .pick-original-odds { font-size: .7rem; color: #444; transition: color .4s; }
    .pick-slot.revealed .pick-original-odds { color: #666; }

    /* ── STATUS ── */
    #statusBar {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: #555;
      min-height: 40px;
      margin: 12px 0;
      transition: color .3s;
    }
    #statusBar.active { color: var(--gold); }

    /* ── DRAWING DOTS ── */
    .drawing-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 3px;
      animation: dotPulse 1.2s infinite;
    }
    .drawing-dot:nth-child(2) { animation-delay: .2s; }
    .drawing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes dotPulse {
      0%,80%,100% { transform: scale(.6); opacity: .3; }
      40%          { transform: scale(1);  opacity: 1; }
    }

    /* ── CONFETTI ── */
    #confettiCanvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
    }

    /* ── SPOTLIGHT ── */
    .spotlight {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
      background: radial-gradient(ellipse 600px 400px at 50% 40%, transparent 30%, rgba(0,0,0,.88) 100%);
      opacity: 0;
      transition: opacity .8s;
    }
    .spotlight.on  { opacity: 1; }
    .spotlight.off { opacity: 0; }

    /* ── REVEAL CARD ── */
    #pickRevealOverlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 100;
    }
    .reveal-card {
      text-align: center;
      padding: 40px 70px;
      border-radius: 24px;
      background: rgba(10,10,18,.97);
      border: 2px solid var(--gold);
      box-shadow: 0 0 80px rgba(255,215,0,.4), 0 0 200px rgba(255,215,0,.1);
      opacity: 0;
      transform: scale(.8) translateY(30px);
      transition: all .5s cubic-bezier(.175,.885,.32,1.275);
      max-width: 90vw;
    }
    .reveal-card.show { opacity: 1; transform: scale(1) translateY(0); }
    .reveal-card .rc-pick      { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 4px; color: #888; margin-bottom: 6px; }
    .reveal-card .rc-pick-num  { font-family: 'Bebas Neue', sans-serif; font-size: 5rem; line-height: 1; color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,.6); }
    .reveal-card.pick-one .rc-pick-num { font-size: 8rem; animation: glowPulse 1s ease-in-out infinite; }
    @keyframes glowPulse {
      0%,100% { text-shadow: 0 0 40px rgba(255,215,0,.6); }
      50%      { text-shadow: 0 0 80px rgba(255,215,0,1), 0 0 120px rgba(255,165,0,.6); }
    }
    .reveal-card .rc-team      { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 3px; color: #fff; margin-top: 6px; }
    .reveal-card.pick-one .rc-team { font-size: 3.5rem; color: var(--gold); }
    .reveal-card .rc-odds      { font-size: .8rem; color: #666; margin-top: 10px; letter-spacing: 1px; }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<div class="spotlight" id="spotlight"></div>
<div id="pickRevealOverlay"><div class="reveal-card" id="revealCard"></div></div>

<header>
  <h1>🏈 Draft Lottery 2026</h1>
  <p>Who drafts first? Fate decides.</p>
</header>

<div class="main-grid">
  <div class="panel">
    <div class="panel-title">🎱 Lottery Machine</div>
    <div class="machine">
      <div id="ballContainer"></div>
      <div class="machine-text" id="machineText">PRESS START TO BEGIN</div>
    </div>
    <div id="statusBar">AWAITING LOTTERY</div>
    <div id="trackLabel"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeFull">🎭 Full Drama</button>
      <button class="mode-btn" id="modeSpeed">⚡ Speed</button>
    </div>
    <div class="btn-wrap">
      <button id="startBtn">🏈 RUN LOTTERY</button>
      <br/><br/>
      <button id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">📋 Draft Order Results</div>
    <div id="resultsBoard"></div>
  </div>

  <div class="panel">
    <div class="panel-title">⚖️ Lottery Odds</div>
    <div class="odds-list" id="oddsList"></div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const TEAMS = [
  { name: 'Schiff',    odds: 25.0,  color: '#FFD700' },
  { name: 'Adam',      odds: 17.5,  color: '#FFA500' },
  { name: 'Goldstein', odds: 14.5,  color: '#FF8C00' },
  { name: 'Katz',      odds: 11.0,  color: '#FF6B00' },
  { name: 'Wolby',     odds: 9.0,   color: '#FF4500' },
  { name: 'Jules',     odds: 7.0,   color: '#e53935' },
  { name: 'Stefan',    odds: 5.5,   color: '#9c27b0' },
  { name: 'Vader',     odds: 4.5,   color: '#3f51b5' },
  { name: 'Fishtoots', odds: 3.5,   color: '#0288d1' },
  { name: 'Coop',      odds: 2.5,   color: '#00897b' },
];

const NUM_TEAMS = TEAMS.length;
let balls = [], ballAnimFrames = {}, lotteryRunning = false, results = [], speedMode = false;

// ─── MUSIC ENGINE ─────────────────────────────────────────────────────────────
// 3 suspenseful procedural tracks via Web Audio API
class MusicEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.nodes = [];
    this.spotlightTimeout = null;
  }

  _init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.52;
      this.masterGain.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }

  _reg(...ns) { ns.forEach(n => this.nodes.push(n)); }

  stop() {
    this.nodes.forEach(n => { try { n.stop(0); } catch(e) {} });
    this.nodes = [];
  }

  fadeOut(dur = 0.35) {
    if (!this.masterGain) return Promise.resolve();
    const g = this.masterGain.gain;
    const t = this.ctx.currentTime;
    g.cancelScheduledValues(t);
    g.setValueAtTime(g.value, t);
    g.linearRampToValueAtTime(0, t + dur);
    return new Promise(r => setTimeout(() => {
      this.stop();
      g.value = 0.52;
      r();
    }, (dur + 0.05) * 1000));
  }

  // ── Primitives ──
  _kick(t, freq = 80, dur = 0.25, vol = 1.2) {
    const { ctx: c } = this;
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(this.masterGain);
    o.frequency.setValueAtTime(freq, t);
    o.frequency.exponentialRampToValueAtTime(18, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.04);
    this._reg(o);
  }

  _snare(t, vol = 0.5, dur = 0.09) {
    const { ctx: c } = this;
    const size = Math.ceil(c.sampleRate * (dur + 0.04));
    const buf = c.createBuffer(1, size, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
    const s = c.createBufferSource(); s.buffer = buf;
    const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2800; f.Q.value = 1;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(f); f.connect(g); g.connect(this.masterGain);
    s.start(t); this._reg(s);
  }

  _pad(freq, t, dur, vol = 0.07, type = 'sawtooth') {
    const { ctx: c } = this;
    const o = c.createOscillator(), lp = c.createBiquadFilter(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 1.5;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + Math.min(0.6, dur * 0.25));
    g.gain.setValueAtTime(vol, t + dur - 0.4);
    g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(lp); lp.connect(g); g.connect(this.masterGain);
    o.start(t); o.stop(t + dur + 0.04); this._reg(o);
  }

  _tone(freq, t, dur, vol, type = 'triangle') {
    const { ctx: c } = this;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(this.masterGain);
    o.start(t); o.stop(t + dur + 0.04); this._reg(o);
  }

  _noiseSweep(t, dur, f0, f1, vol = 0.32) {
    const { ctx: c } = this;
    const size = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, size, c.sampleRate);
    const d = buf.getChannelData(0); for (let i = 0; i < size; i++) d[i] = Math.random() * 2 - 1;
    const s = c.createBufferSource(); s.buffer = buf;
    const f = c.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 3;
    f.frequency.setValueAtTime(f0, t); f.frequency.linearRampToValueAtTime(f1, t + dur);
    const g = c.createGain();
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(vol, t + dur * 0.25);
    g.gain.linearRampToValueAtTime(0, t + dur);
    s.connect(f); f.connect(g); g.connect(this.masterGain);
    s.start(t); this._reg(s);
  }

  // ── TRACK 1: "HEARTBEAT" — speeding double-kick with rising swell ──
  _track1(dur) {
    const { ctx: c } = this; const now = c.currentTime, end = now + dur;
    document.getElementById('trackLabel').textContent = '♩ HEARTBEAT';

    // Low rumble pad
    this._pad(41.2, now, dur, 0.065, 'sine');
    this._pad(55,   now, dur, 0.045, 'sawtooth');

    // Lub-dub heartbeat accelerating
    let t = now + 0.25, interval = 1.05;
    while (t < end - 0.5) {
      this._kick(t,       88,  0.2,  1.3);   // lub
      this._kick(t + 0.14, 70, 0.13, 0.85);  // dub
      t += interval;
      interval = Math.max(0.26, interval * 0.875);
    }

    // Rising noise sweep final 2s
    this._noiseSweep(end - 2.2, 2.0, 130, 3800, 0.35);

    // Climactic boom
    this._kick(end - 0.06, 115, 0.5, 2.3);
  }

  // ── TRACK 2: "TENSION" — tremolo strings over a building low drone ──
  _track2(dur) {
    const { ctx: c } = this; const now = c.currentTime, end = now + dur;
    document.getElementById('trackLabel').textContent = '🎻 TENSION STRINGS';

    // Bass foundation (A minor root)
    this._pad(55,    now, dur, 0.09, 'sawtooth');
    this._pad(82.5,  now, dur, 0.075, 'sawtooth');
    this._pad(110,   now, dur, 0.055, 'sawtooth');

    // Manual tremolo: schedule amplitude on/off for each voice
    // (faster tremolo as we get closer to end)
    const voices = [110, 138.6, 165, 220];
    voices.forEach((freq, vi) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      o.connect(g); g.connect(this.masterGain);

      const baseVol = 0.065 - vi * 0.01;
      let sched = now + 0.05;
      let cycleLen = 0.13; // tremolo cycle start

      // Envelope ramp up
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(baseVol * 0.5, now + 1.0);

      while (sched < end - 0.1) {
        const progress = (sched - now) / dur;
        const vol = baseVol * (0.5 + progress * 0.5);
        cycleLen = Math.max(0.045, 0.13 - progress * 0.07);
        g.gain.setValueAtTime(vol, sched);
        g.gain.setValueAtTime(vol * 0.15, sched + cycleLen * 0.5);
        sched += cycleLen;
      }
      g.gain.linearRampToValueAtTime(0, end);

      o.start(now); o.stop(end + 0.04); this._reg(o);
    });

    // Low rhythmic pulse hits — evenly spread, subtle
    const nHits = 8;
    for (let i = 0; i < nHits; i++) {
      const frac = i / (nHits - 1);
      this._kick(now + 0.3 + frac * (dur * 0.78), 62 + i * 2, 0.22, 0.65 + i * 0.09);
    }

    // High shimmer rising in second half
    const shimSteps = [1320, 1568, 1760, 2093, 2349, 2794];
    shimSteps.forEach((f, i) => {
      const t = now + dur * 0.45 + (i / shimSteps.length) * dur * 0.45;
      this._tone(f, t, 1.2, 0.025 + i * 0.004, 'sine');
    });

    // Final sweep
    this._noiseSweep(end - 1.8, 1.6, 220, 4500, 0.3);
    this._kick(end - 0.06, 100, 0.45, 2.1);
  }

  // ── TRACK 3: "COUNTDOWN" — ascending minor-scale steps with impact hits ──
  _track3(dur) {
    const { ctx: c } = this; const now = c.currentTime, end = now + dur;
    document.getElementById('trackLabel').textContent = '🎺 COUNTDOWN';

    // Low drone throughout
    this._pad(55,   now, dur, 0.07, 'sawtooth');
    this._pad(82.5, now, dur, 0.05, 'sawtooth');

    // Natural minor scale — 8 steps, each gets louder and faster kick
    const semitones = [0, 2, 3, 5, 7, 8, 10, 12];
    const stepDur = dur / semitones.length;

    semitones.forEach((st, i) => {
      const freq = 110 * Math.pow(2, st / 12);
      const t = now + i * stepDur;
      const vol = 0.16 + i * 0.028;

      // Staccato triangle hit + octave sub
      this._tone(freq, t, stepDur * 0.62, vol, 'triangle');
      this._tone(freq / 2, t, stepDur * 0.5, vol * 0.45, 'sine');

      // Impact kick underneath each note
      this._kick(t, 68 + i * 4, 0.22 + i * 0.01, 0.85 + i * 0.12);

      // Snare rolls build in the last 4 steps
      if (i >= 4) {
        const rolls = (i - 3) * 2;
        for (let r = 0; r < rolls; r++) {
          this._snare(t + (r / rolls) * stepDur * 0.82, 0.28 + r * 0.06, 0.065);
        }
      }
    });

    // Climax sweep + big finish
    this._noiseSweep(end - 1.6, 1.4, 180, 5500, 0.33);
    this._kick(end - 0.06, 125, 0.55, 2.6);
    this._snare(end - 0.06, 0.75, 0.16);
  }

  play(trackIndex, duration) {
    this._init();
    this.stop();
    const tracks = [this._track1, this._track2, this._track3];
    tracks[trackIndex % 3].call(this, duration);
  }
}

const music = new MusicEngine();

// ─── BUILD UI ─────────────────────────────────────────────────────────────────
function buildOddsList() {
  const list = document.getElementById('oddsList');
  list.innerHTML = '';
  TEAMS.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = `odds-row rank-${i+1}`;
    row.id = `odds-row-${i}`;
    row.innerHTML = `
      <span class="team-rank">${i+1}</span>
      <span class="team-name">${t.name}</span>
      <div class="odds-bar-wrap"><div class="odds-bar" style="width:${(t.odds/25)*100}%"></div></div>
      <span class="odds-pct">${t.odds}%</span>`;
    list.appendChild(row);
  });
}

function buildResultsBoard() {
  const board = document.getElementById('resultsBoard');
  board.innerHTML = '';
  for (let i = 1; i <= NUM_TEAMS; i++) {
    const slot = document.createElement('div');
    slot.className = 'pick-slot';
    slot.id = `pick-slot-${i}`;
    slot.innerHTML = `
      <div class="pick-number">${i}</div>
      <div class="pick-divider"></div>
      <div class="pick-team">—</div>
      <div class="pick-original-odds"></div>`;
    board.appendChild(slot);
  }
}

// ─── BALLS ────────────────────────────────────────────────────────────────────
function spawnBalls() {
  const container = document.getElementById('ballContainer');
  container.innerHTML = '';
  document.getElementById('machineText').textContent = '';
  balls = [];
  TEAMS.forEach((t, i) => {
    const size = 38 + Math.random() * 10;
    const el = document.createElement('div');
    el.className = 'ball';
    el.style.cssText = `width:${size}px;height:${size}px;
      background:radial-gradient(circle at 35% 35%,${lighten(t.color,.4)},${t.color} 60%,${darken(t.color,.3)});
      color:rgba(0,0,0,0.75);font-size:${size*.22}px;
      left:${Math.random()*80+5}%;top:${Math.random()*70+10}%;`;
    el.textContent = t.name.slice(0,4).toUpperCase();
    container.appendChild(el);
    balls.push({ el, x: parseFloat(el.style.left), y: parseFloat(el.style.top),
      vx: (Math.random()-.5)*3, vy: (Math.random()-.5)*3, size, active: true });
  });
  animateBalls();
}

function animateBalls() {
  if (ballAnimFrames.raf) cancelAnimationFrame(ballAnimFrames.raf);
  function frame() {
    balls.forEach(b => {
      if (!b.active) return;
      b.x += b.vx; b.y += b.vy;
      const maxX = 100 - b.size/3.4, maxY = 100 - b.size/1.6;
      if (b.x < 0)    { b.x = 0;    b.vx *= -1; }
      if (b.x > maxX) { b.x = maxX; b.vx *= -1; }
      if (b.y < 0)    { b.y = 0;    b.vy *= -1; }
      if (b.y > maxY) { b.y = maxY; b.vy *= -1; }
      b.vx += (Math.random()-.5)*.15; b.vy += (Math.random()-.5)*.15;
      const spd = Math.hypot(b.vx, b.vy);
      if (spd > 3.5) { b.vx = b.vx/spd*3.5; b.vy = b.vy/spd*3.5; }
      if (spd < 0.5) { b.vx += (Math.random()-.5)*1; b.vy += (Math.random()-.5)*1; }
      b.el.style.left = b.x + '%'; b.el.style.top = b.y + '%';
    });
    ballAnimFrames.raf = requestAnimationFrame(frame);
  }
  ballAnimFrames.raf = requestAnimationFrame(frame);
}

function stopBallAnimations() { if (ballAnimFrames.raf) cancelAnimationFrame(ballAnimFrames.raf); }
function eliminateBall(i) {
  const b = balls[i]; if (!b) return;
  b.active = false; b.el.style.opacity = '0';
  setTimeout(() => b.el.remove(), 400);
}

// ─── COLORS ───────────────────────────────────────────────────────────────────
function lighten(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255,(n>>16)+Math.round(255*amt)), g = Math.min(255,((n>>8)&0xff)+Math.round(255*amt)), b = Math.min(255,(n&0xff)+Math.round(255*amt));
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}
function darken(hex, amt) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.max(0,(n>>16)-Math.round(255*amt)), g = Math.max(0,((n>>8)&0xff)-Math.round(255*amt)), b = Math.max(0,(n&0xff)-Math.round(255*amt));
  return `#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

// ─── WEIGHTED DRAW ────────────────────────────────────────────────────────────
function weightedDraw(pool) {
  const total = pool.reduce((s,p) => s + p.weight, 0);
  let r = Math.random() * total;
  for (const p of pool) { r -= p.weight; if (r <= 0) return p.teamIndex; }
  return pool[pool.length-1].teamIndex;
}

function runLotteryDraw() {
  let pool = TEAMS.map((t,i) => ({ teamIndex:i, weight:t.odds }));
  results = [];
  for (let pick = 1; pick <= NUM_TEAMS; pick++) {
    const winner = weightedDraw(pool);
    results.push(winner);
    pool = pool.filter(p => p.teamIndex !== winner);
  }
}

// ─── REVEAL SEQUENCE ──────────────────────────────────────────────────────────
async function revealSequence() {
  const statusBar = document.getElementById('statusBar');

  for (let revealPick = NUM_TEAMS; revealPick >= 1; revealPick--) {
    const teamIndex  = results[revealPick - 1];
    const team       = TEAMS[teamIndex];
    const isFirstPick = revealPick === 1;
    const trackIdx   = (NUM_TEAMS - revealPick) % 3;

    // Status
    statusBar.className = 'active';
    statusBar.innerHTML = isFirstPick
      ? `<span style="color:var(--gold)">🏆 THE #1 OVERALL PICK IS...</span>`
      : `PICK ${revealPick} — WHO WILL IT BE?`;

    // Play suspenseful music track for the buildup
    const buildupMs = speedMode
      ? (isFirstPick ? 2800 : 2000)
      : (isFirstPick ? 9200 : 6700);
    music.play(trackIdx, (buildupMs + (speedMode ? 300 : 600)) / 1000);

    // Let the suspense cook 🔥
    await sleep(buildupMs);

    // Fade music, short dramatic pause
    await music.fadeOut(speedMode ? 0.15 : 0.35);
    await sleep(speedMode ? 60 : 180);

    // Flash the odds row
    const oddsRow = document.getElementById(`odds-row-${teamIndex}`);
    oddsRow.classList.add('winner-flash');
    setTimeout(() => oddsRow.classList.remove('winner-flash'), 700);

    // Show reveal card
    const holdMs = speedMode
      ? (isFirstPick ? 1200 : 700)
      : (isFirstPick ? 3800 : revealPick <= 3 ? 2900 : 2300);
    await showRevealCard(revealPick, team, isFirstPick, holdMs);

    // Update board
    const slot = document.getElementById(`pick-slot-${revealPick}`);
    slot.classList.add('revealed', 'revealing');
    if (isFirstPick) slot.classList.add('pick-1');
    slot.querySelector('.pick-team').textContent = team.name;
    slot.querySelector('.pick-original-odds').textContent = `${team.odds}% odds`;
    setTimeout(() => slot.classList.remove('revealing'), 600);

    oddsRow.classList.add('eliminated');
    eliminateBall(teamIndex);
    document.getElementById('trackLabel').textContent = '';

    if (isFirstPick) {
      launchConfetti();
      const sl = document.getElementById('spotlight');
      sl.classList.add('on');
      // ── FIX: auto-remove spotlight after confetti settles ──
      setTimeout(() => {
        sl.classList.remove('on');
      }, 5200);
    }

    await sleep(speedMode ? 150 : 400);
  }

  document.getElementById('statusBar').innerHTML =
    `🏆 LOTTERY COMPLETE — ${TEAMS[results[0]].name.toUpperCase()} PICKS FIRST!`;
  document.getElementById('trackLabel').textContent = '';
  stopBallAnimations();
  document.getElementById('startBtn').disabled = true;
  document.getElementById('resetBtn').style.display = 'inline-block';
}

// ─── REVEAL CARD ──────────────────────────────────────────────────────────────
function showRevealCard(pickNum, team, isFirst, holdMs = 2300) {
  return new Promise(resolve => {
    const card = document.getElementById('revealCard');
    card.className = 'reveal-card' + (isFirst ? ' pick-one' : '');
    card.innerHTML = `
      <div class="rc-pick">PICK</div>
      <div class="rc-pick-num">${pickNum}</div>
      <div class="rc-team">${team.name.toUpperCase()}</div>
      <div class="rc-odds">${team.odds}% original odds</div>`;
    setTimeout(() => {
      card.classList.add('show');
      setTimeout(() => {
        card.classList.remove('show');
        setTimeout(resolve, 500);
      }, holdMs);
    }, 120);
  });
}

// ─── START ────────────────────────────────────────────────────────────────────
async function startLottery() {
  if (lotteryRunning) return;
  lotteryRunning = true;
  document.getElementById('startBtn').disabled = true;
  const statusBar = document.getElementById('statusBar');

  buildResultsBoard();
  spawnBalls();
  statusBar.className = 'active';
  statusBar.innerHTML = `DRAWING<span class="drawing-dot"></span><span class="drawing-dot"></span><span class="drawing-dot"></span>`;

  await sleep(speedMode ? 800 : 2800);
  runLotteryDraw();

  balls.forEach(b => { b.vx *= 0.3; b.vy *= 0.3; });
  statusBar.innerHTML = `RESULTS INCOMING...`;
  await sleep(speedMode ? 300 : 800);

  await revealSequence();
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetLottery() {
  lotteryRunning = false;
  stopBallAnimations();
  music.stop();
  results = [];
  document.getElementById('ballContainer').innerHTML = '';
  document.getElementById('machineText').textContent = 'PRESS START TO BEGIN';
  const statusBar = document.getElementById('statusBar');
  statusBar.className = ''; statusBar.textContent = 'AWAITING LOTTERY';
  document.getElementById('trackLabel').textContent = '';
  TEAMS.forEach((_,i) => {
    const row = document.getElementById(`odds-row-${i}`);
    if (row) row.classList.remove('eliminated','winner-flash');
  });
  buildResultsBoard();
  document.getElementById('revealCard').className = 'reveal-card';
  document.getElementById('spotlight').classList.remove('on');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resetBtn').style.display = 'none';
  stopConfetti();
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
let confettiRaf = null, confettiParticles = [];
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFD700','#FFA500','#FF6347','#00e676','#2979ff','#ffffff','#ff4081','#7c4dff'];
  confettiParticles = Array.from({length: 240}, () => ({
    x: Math.random()*canvas.width, y: -20-Math.random()*100,
    vx: (Math.random()-.5)*4, vy: 3+Math.random()*4,
    color: colors[Math.floor(Math.random()*colors.length)],
    size: 6+Math.random()*8, rotation: Math.random()*360,
    rotVel: (Math.random()-.5)*8, shape: Math.random()<.5 ? 'rect' : 'circle',
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettiParticles.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180);
      ctx.fillStyle = p.color;
      if (p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.rotation+=p.rotVel;
    });
    confettiParticles = confettiParticles.filter(p => p.y < canvas.height+40);
    if (confettiParticles.length > 0) confettiRaf = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  if (confettiRaf) cancelAnimationFrame(confettiRaf);
  confettiRaf = requestAnimationFrame(draw);
}
function stopConfetti() {
  if (confettiRaf) cancelAnimationFrame(confettiRaf);
  const canvas = document.getElementById('confettiCanvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  confettiParticles = [];
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startLottery);
document.getElementById('resetBtn').addEventListener('click', resetLottery);

document.getElementById('modeFull').addEventListener('click', () => {
  speedMode = false;
  document.getElementById('modeFull').classList.add('active');
  document.getElementById('modeSpeed').classList.remove('active');
});
document.getElementById('modeSpeed').addEventListener('click', () => {
  speedMode = true;
  document.getElementById('modeSpeed').classList.add('active');
  document.getElementById('modeFull').classList.remove('active');
});
window.addEventListener('resize', () => {
  const c = document.getElementById('confettiCanvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
});

buildOddsList();
buildResultsBoard();
</script>
